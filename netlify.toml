# ══════════════════════════════════════════════════════════
#  netlify.toml  –  Netlify Build & Function Configuration
#  Nova Dev Contact Form Fix
# ══════════════════════════════════════════════════════════

[build]
  # Publish directory (where your HTML/CSS/JS files live)
  publish = "."
  
  # Functions directory
  functions = "netlify/functions"
  
  # Command to run before build (optional - uncomment if needed)
  # command = "npm install"

[functions]
  # Node.js bundler - esbuild is faster and recommended
  node_bundler = "esbuild"
  
  # Include node_modules in the bundle
  included_files = ["netlify/functions/send-email/node_modules/**"]

# ── Security Headers ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# ── API Headers (CORS for functions) ────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "POST, OPTIONS"

# ── Redirects (uncomment if you need SPA routing) ───────────
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

