<svg width="200" height="56" viewBox="0 0 200 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00c2a8"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Mark background -->
  <rect x="0" y="4" width="48" height="48" rx="12" fill="url(#logoGrad)"/>
  <!-- Shine overlay -->
  <rect x="0" y="4" width="48" height="48" rx="12" fill="url(#glowGrad)"/>
  <!-- Decorative circle top-right -->
  <circle cx="43" cy="9" r="5" fill="#00c2a8" opacity="0.9"/>
  <circle cx="43" cy="9" r="3" fill="white" opacity="0.6"/>

  <!-- Code brackets  < /> -->
  <text x="5" y="37" font-family="'Courier New', monospace" font-size="24" font-weight="900" fill="white" letter-spacing="-1">&lt;/&gt;</text>

  <!-- Wordmark -->
  <!-- "Nova" -->
  <text x="60" y="30" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" font-weight="900" fill="#0d1b2a" letter-spacing="-0.5">Nova</text>
  <!-- "Dev" in accent -->
  <text x="110" y="30" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="22" font-weight="900" fill="#00c2a8" letter-spacing="-0.5">Dev</text>
  <!-- Tagline -->
  <text x="60" y="44" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="9" font-weight="500" fill="#6b7280" letter-spacing="1.2">WEB DEVELOPMENT &amp; DIGITAL MARKETING</text>

  <!-- Accent underline under NovaDev -->
  <rect x="60" y="33" width="80" height="2.5" rx="1.25" fill="url(#logoGrad)" opacity="0.5"/>
</svg>
